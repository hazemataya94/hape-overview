---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-memory-only
  namespace: cost-b
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-memory-only
  template:
    metadata:
      labels:
        app: api-memory-only
    spec:
      nodeSelector:
        node.kubernetes.io/instance-type: r6i.large
